<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - Teammate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #2995b0;
            --secondary: #fec55b;
            --accent: #ec9e00;
            --light: #f8f9fa;
            --dark: #1a2a3a;
            --text-dark: #1a2a3a;
            --text-light: #6c757d;
            --border-color: #e0e0e0;
            --card-bg: rgba(255, 255, 255, 0.95);
            --transition: all 0.3s ease;
        }

        body {
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background-image: url(f.jpg);
            background-attachment: fixed;
            background-size: cover;
            padding: 40px 20px;
        }

        /* Animated background elements */
        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite linear;
        }

        .bg-element:nth-child(1) {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 5%;
            animation-duration: 25s;
        }

        .bg-element:nth-child(2) {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            top: 70%;
            left: 80%;
            animation-delay: -5s;
            animation-duration: 20s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 30px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--accent);
            transform: translateX(-3px);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .project-image {
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }

        .project-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .project-content h3 {
            color: var(--dark);
            margin-bottom: 10px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .project-content p {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .project-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .status-active {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-completed {
            background: #e8f5e8;
            color: #388e3c;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .project-meta i {
            color: var(--primary);
            margin-right: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--dark);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .empty-state p {
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(41, 149, 176, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(236, 158, 0, 0.3);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
                padding: 15px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .header > div {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
            .back-link {
                justify-content: center;
                margin-right: 0 !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background elements -->
    <div class="bg-elements">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>My Projects</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="FINAL.html" class="back-link" style="margin-right: 15px;"><i class="fas fa-arrow-left"></i> Back to Home</a>
                <a href="certification.html" class="back-link"><i class="fas fa-certificate"></i> Certifications</a>
            </div>
        </div>

        <div id="projectsGrid" class="projects-grid" style="display: none;"></div>

        <div id="emptyState" class="empty-state">
            <i class="fas fa-project-diagram"></i>
            <h2>No Projects Yet</h2>
            <p>You haven't joined or created any projects yet. Explore available teams to get started!</p>
            <a href="FINAL.html" class="btn-primary">Explore Projects</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Dynamic host URL resolution
            const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:5000'
                : window.location.origin;

            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            if (!token) {
                window.location.href = 'li.html';
                return;
            }

            const projectsGrid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');

            async function loadMyProjects() {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/projects/my-projects`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const projects = await res.json();
                    
                    if (res.ok && projects.length > 0) {
                        emptyState.style.display = 'none';
                        projectsGrid.style.display = 'grid';
                        renderProjects(projects);
                    } else {
                        emptyState.style.display = 'block';
                        projectsGrid.style.display = 'none';
                    }
                } catch (error) {
                    console.error('Error fetching my projects:', error);
                }
            }

            function renderProjects(projects) {
                projectsGrid.innerHTML = projects.map(proj => {
                    const isCreator = proj.creator && proj.creator._id === userId;
                    
                    // Determine project status badge
                    let roleBadge = '<span class="project-status status-completed">Collaborator</span>';
                    if (isCreator) {
                        roleBadge = '<span class="project-status status-active">Project Creator</span>';
                    } else {
                        // Find applicant status
                        const application = proj.applicants.find(a => a.user._id === userId || a.user === userId);
                        if (application) {
                            if (application.status === 'pending') {
                                roleBadge = '<span class="project-status" style="background:#fff3e0; color:#e65100;">Pending Application</span>';
                            } else if (application.status === 'rejected') {
                                roleBadge = '<span class="project-status" style="background:#ffebee; color:#c62828;">Application Rejected</span>';
                            } else if (application.status === 'accepted') {
                                roleBadge = '<span class="project-status status-completed">Member (Accepted)</span>';
                            }
                        }
                    }

                    // List applicants management block if creator
                    let applicantsHtml = '';
                    if (isCreator && proj.applicants && proj.applicants.length > 0) {
                        const pendingApplicants = proj.applicants.filter(a => a.status === 'pending');
                        if (pendingApplicants.length > 0) {
                            applicantsHtml = `
                                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                                    <h4 style="font-size: 0.95rem; margin-bottom: 10px; color: var(--primary);">Review Applicants:</h4>
                                    <ul style="list-style: none;">
                                        ${pendingApplicants.map(app => `
                                            <li style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; background: var(--light); padding: 8px; border-radius: 8px; gap: 10px;">
                                                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"><strong>${escapeHtml(app.user.username)}</strong></span>
                                                <div style="display: flex; gap: 5px; flex-shrink: 0;">
                                                    <button onclick="processAction('${proj._id}', '${app.user._id}', 'accept')" style="background: #2e7d32; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Accept</button>
                                                    <button onclick="processAction('${proj._id}', '${app.user._id}', 'reject')" style="background: #c62828; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Reject</button>
                                                </div>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                            `;
                        }
                    }

                    const skillsHtml = proj.skills.map(s => `<span style="background: #f1f5f9; color: var(--text-light); padding: 3px 8px; border-radius: 12px; font-size: 0.75rem;">${escapeHtml(s)}</span>`).join(' ');

                    return `
                        <div class="project-card">
                            <div class="project-image">
                                <i class="fas ${escapeHtml(proj.icon || 'fa-project-diagram')}"></i>
                            </div>
                            <div class="project-content">
                                ${roleBadge}
                                <h3 style="margin-top: 10px; font-size: 1.25rem;">${escapeHtml(proj.title)}</h3>
                                <p style="font-size: 0.85rem; margin-bottom: 15px; line-height: 1.4;">${escapeHtml(proj.description)}</p>
                                <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px;">
                                    ${skillsHtml}
                                </div>
                                <div class="project-meta" style="margin-bottom: 0;">
                                    <span><i class="fas fa-user"></i> By: ${escapeHtml(proj.creator.username)}</span>
                                    <span><i class="fas fa-users"></i> Team: ${proj.members ? proj.members.length : 1}</span>
                                </div>
                                ${applicantsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.processAction = async function(projectId, applicantId, action) {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/projects/${projectId}/action`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ applicantId, action })
                    });
                    
                    if (res.ok) {
                        alert(`Applicant successfully ${action}ed!`);
                        loadMyProjects();
                    } else {
                        const data = await res.json();
                        alert(data.msg || 'Action failed');
                    }
                } catch (error) {
                    console.error('Error actioning applicant:', error);
                }
            };

            function escapeHtml(str) {
                if (!str) return "";
                return str.toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            loadMyProjects();
        });
    </script>
</body>
</html>
