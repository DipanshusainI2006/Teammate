<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - Teammate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Copy the complete-profile.html styles from previous message */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --primary: #2995b0;
            --secondary: #fec55b;
            --accent: #ec9e00;
            --light: #f8f9fa;
            --dark: #1a2a3a;
            --success: #4cc9f0;
            --transition: all 0.3s ease;
            --text-dark: #1a2a3a;
            --text-light: #6c757d;
            --border-color: #e0e0e0;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 5px;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .profile-pic {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--primary);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-pic-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover .profile-pic-overlay {
            transform: translateY(0);
        }

        .profile-pic input {
            display: none;
        }

        .profile-title {
            flex: 1;
        }

        .profile-title h2 {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .profile-title p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .form-section {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .form-section h3 {
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(41, 149, 176, 0.2);
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .skill-tag {
            background: var(--light);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .skill-tag i {
            color: var(--primary);
            cursor: pointer;
        }

        .add-skill {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-skill input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add:hover {
            background: #23819a;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-skip {
            background: none;
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-skip:hover {
            background: var(--light);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-save:hover {
            background: #23819a;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Complete Your Profile</h1>
            <p>Help others get to know you better. Complete your profile to start collaborating!</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 25%"></div>
        </div>

        <form id="completeProfileForm">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-pic" onclick="document.getElementById('profilePic').click()">
                        <img src="https://via.placeholder.com/150" alt="Profile" id="profilePreview">
                        <div class="profile-pic-overlay">
                            <i class="fas fa-camera"></i> Change
                        </div>
                        <input type="file" id="profilePic" accept="image/*" style="display: none;">
                    </div>
                    <div class="profile-title">
                        <h2 id="displayName">Welcome!</h2>
                        <p id="displayHeadline">Add your professional headline</p>
                    </div>
                </div>

                <!-- Basic Information -->
                <div class="form-section">
                    <h3><i class="fas fa-user"></i> Basic Information</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="headline">Professional Headline *</label>
                            <input type="text" id="headline" class="form-control" placeholder="e.g. Full Stack Developer" required>
                        </div>
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" class="form-control" placeholder="City, Country">
                        </div>
                        <div class="form-group">
                            <label for="bio">Bio</label>
                            <textarea id="bio" class="form-control" rows="3" placeholder="Tell us about yourself..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Skills Section -->
                <div class="form-section">
                    <h3><i class="fas fa-code"></i> Skills</h3>
                    <div class="skills-container" id="skillsContainer">
                        <!-- Skills will be added here -->
                    </div>
                    <div class="add-skill">
                        <input type="text" id="newSkill" placeholder="Add a skill">
                        <button type="button" class="btn-add" onclick="addSkill()">Add</button>
                    </div>
                </div>

                <!-- Social Links -->
                <div class="form-section">
                    <h3><i class="fas fa-link"></i> Social Links</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="github"><i class="fab fa-github"></i> GitHub</label>
                            <input type="url" id="github" class="form-control" placeholder="https://github.com/username">
                        </div>
                        <div class="form-group">
                            <label for="linkedin"><i class="fab fa-linkedin"></i> LinkedIn</label>
                            <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/username">
                        </div>
                        <div class="form-group">
                            <label for="portfolio"><i class="fas fa-globe"></i> Portfolio</label>
                            <input type="url" id="portfolio" class="form-control" placeholder="https://yourportfolio.com">
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn-skip" onclick="skipForNow()">Skip for Now</button>
                    <button type="submit" class="btn-save">Save & Continue</button>
                </div>
            </div>
        </form>
    </div>

    <script>
// Dynamic host URL resolution
const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000'
    : window.location.origin;

// Load user data from localStorage
document.addEventListener('DOMContentLoaded', function() {
    const username = localStorage.getItem('username');
    const skills = localStorage.getItem('skills');
    const userProfile = localStorage.getItem('userProfile');
    
    if (username) {
        document.getElementById('displayName').textContent = `Welcome, ${username}!`;
        document.getElementById('fullName').value = username;
    }

    // Load existing profile data if available
    if (userProfile) {
        try {
            const profile = JSON.parse(userProfile);
            if (profile.fullName) document.getElementById('fullName').value = profile.fullName;
            if (profile.headline) document.getElementById('headline').value = profile.headline;
            if (profile.location) document.getElementById('location').value = profile.location;
            if (profile.bio) document.getElementById('bio').value = profile.bio;
            if (profile.socialLinks) {
                if (profile.socialLinks.github) document.getElementById('github').value = profile.socialLinks.github;
                if (profile.socialLinks.linkedin) document.getElementById('linkedin').value = profile.socialLinks.linkedin;
                if (profile.socialLinks.portfolio) document.getElementById('portfolio').value = profile.socialLinks.portfolio;
            }
            if (profile.skills && profile.skills.length > 0) {
                profile.skills.forEach(skill => addSkillTag(skill));
            }
        } catch (e) {
            console.error('Error parsing profile:', e);
        }
    }

    // Load skills from signup if no profile yet
    if (skills && !userProfile) {
        const skillsArray = skills.split(',').map(s => s.trim()).filter(s => s);
        skillsArray.forEach(skill => {
            if (skill) {
                addSkillTag(skill);
            }
        });
    }

    // Update progress
    updateProgress();
});

// Profile picture preview
document.getElementById('profilePic').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('profilePreview').src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

// Update headline in real-time
document.getElementById('headline').addEventListener('input', function(e) {
    document.getElementById('displayHeadline').textContent = e.target.value || 'Add your professional headline';
});

// Add skill
function addSkill() {
    const input = document.getElementById('newSkill');
    const skill = input.value.trim();
    
    if (skill) {
        addSkillTag(skill);
        input.value = '';
        updateProgress();
    }
}

function addSkillTag(skill) {
    const container = document.getElementById('skillsContainer');
    const skillTag = document.createElement('span');
    skillTag.className = 'skill-tag';
    skillTag.innerHTML = `${skill} <i class="fas fa-times" onclick="this.parentElement.remove(); updateProgress();"></i>`;
    container.appendChild(skillTag);
}

// Update progress bar
function updateProgress() {
    let completed = 0;
    const total = 4;

    if (document.getElementById('fullName').value && document.getElementById('headline').value) completed++;
    if (document.getElementById('skillsContainer').children.length > 0) completed++;
    if (document.getElementById('bio').value) completed++;
    if (document.getElementById('github').value || document.getElementById('linkedin').value || document.getElementById('portfolio').value) completed++;

    const percentage = (completed / total) * 100;
    document.getElementById('progressFill').style.width = percentage + '%';
}

// Add event listeners for progress updates
document.getElementById('fullName').addEventListener('input', updateProgress);
document.getElementById('headline').addEventListener('input', updateProgress);
document.getElementById('bio').addEventListener('input', updateProgress);
document.getElementById('github').addEventListener('input', updateProgress);
document.getElementById('linkedin').addEventListener('input', updateProgress);
document.getElementById('portfolio').addEventListener('input', updateProgress);

// Skip for now
function skipForNow() {
    localStorage.setItem('profileCompleted', 'false');
    window.location.href = 'FINAL.html';
}

// Save profile
document.getElementById('completeProfileForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Collect skills
    const skills = Array.from(document.querySelectorAll('#skillsContainer .skill-tag')).map(tag => 
        tag.textContent.replace('×', '').trim()
    );

    // Create profile data
    const profileData = {
        fullName: document.getElementById('fullName').value,
        headline: document.getElementById('headline').value,
        location: document.getElementById('location').value,
        bio: document.getElementById('bio').value,
        skills: skills,
        socialLinks: {
            github: document.getElementById('github').value,
            linkedin: document.getElementById('linkedin').value,
            portfolio: document.getElementById('portfolio').value
        }
    };

    // Save profile picture if exists
    const profilePic = document.getElementById('profilePreview').src;
    if (profilePic && !profilePic.includes('via.placeholder.com')) {
        profileData.profilePic = profilePic;
    }

    // Save to localStorage
    localStorage.setItem('userProfile', JSON.stringify(profileData));
    localStorage.setItem('profileCompleted', 'true');
    
    // Try to save to backend if token exists
    const token = localStorage.getItem('token');
    if (token) {
        try {
             const res = await fetch(`${API_BASE_URL}/api/profile/complete`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(profileData)
            });
            
            if (res.ok) {
                console.log('Profile saved to backend');
            } else {
                console.warn('Backend save failed, but data saved locally');
            }
        } catch (error) {
            console.error('Backend save failed, but data saved locally:', error);
        }
    }

    alert('Profile completed successfully!');
    window.location.href = 'FINAL.html';
});
</script>
</body>
</html>
