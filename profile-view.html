<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - Teammate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --primary: #2995b0;
            --secondary: #fec55b;
            --accent: #ec9e00;
            --light: #f8f9fa;
            --dark: #1a2a3a;
            --text-light: #6c757d;
            --border-color: #e0e0e0;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2rem;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-image {
            height: 150px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .project-content {
            padding: 20px;
        }

        .project-content h3 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        .project-content p {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .project-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .status-active {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-completed {
            background: #e8f5e8;
            color: #388e3c;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .project-meta i {
            color: var(--primary);
            margin-right: 5px;
        }

        .btn-view {
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .btn-view:hover {
            background: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Projects</h1>
            <a href="FINAL.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

        <div id="projectsGrid" class="projects-grid" style="display: none;"></div>

        <div id="emptyState" class="empty-state">
            <i class="fas fa-project-diagram"></i>
            <h2>No Projects Yet</h2>
            <p>You haven't joined any projects yet. Explore projects and join a team to get started!</p>
            <a href="FINAL.html" class="btn-primary">Explore Projects</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            if (!token) {
                window.location.href = 'li.html';
                return;
            }

            const projectsGrid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');

            async function loadMyProjects() {
                try {
                    const res = await fetch('http://localhost:5000/api/projects/my-projects', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const projects = await res.json();
                    
                    if (res.ok && projects.length > 0) {
                        emptyState.style.display = 'none';
                        projectsGrid.style.display = 'grid';
                        renderProjects(projects);
                    } else {
                        emptyState.style.display = 'block';
                        projectsGrid.style.display = 'none';
                    }
                } catch (error) {
                    console.error('Error fetching my projects:', error);
                }
            }

            function renderProjects(projects) {
                projectsGrid.innerHTML = projects.map(proj => {
                    const isCreator = proj.creator && proj.creator._id === userId;
                    
                    // Determine project status badge
                    let roleBadge = '<span class="project-status status-completed">Collaborator</span>';
                    if (isCreator) {
                        roleBadge = '<span class="project-status status-active">Project Creator</span>';
                    } else {
                        // Find applicant status
                        const application = proj.applicants.find(a => a.user._id === userId || a.user === userId);
                        if (application) {
                            if (application.status === 'pending') {
                                roleBadge = '<span class="project-status" style="background:#fff3e0; color:#e65100;">Pending Application</span>';
                            } else if (application.status === 'rejected') {
                                roleBadge = '<span class="project-status" style="background:#ffebee; color:#c62828;">Application Rejected</span>';
                            } else if (application.status === 'accepted') {
                                roleBadge = '<span class="project-status status-completed">Member (Accepted)</span>';
                            }
                        }
                    }

                    // List applicants management block if creator
                    let applicantsHtml = '';
                    if (isCreator && proj.applicants && proj.applicants.length > 0) {
                        const pendingApplicants = proj.applicants.filter(a => a.status === 'pending');
                        if (pendingApplicants.length > 0) {
                            applicantsHtml = `
                                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                                    <h4 style="font-size: 0.95rem; margin-bottom: 10px; color: var(--primary);">Review Applicants:</h4>
                                    <ul style="list-style: none;">
                                        ${pendingApplicants.map(app => `
                                            <li style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; background: var(--light); padding: 8px; border-radius: 8px; gap: 10px;">
                                                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"><strong>${escapeHtml(app.user.username)}</strong></span>
                                                <div style="display: flex; gap: 5px; flex-shrink: 0;">
                                                    <button onclick="processAction('${proj._id}', '${app.user._id}', 'accept')" style="background: #2e7d32; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Accept</button>
                                                    <button onclick="processAction('${proj._id}', '${app.user._id}', 'reject')" style="background: #c62828; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Reject</button>
                                                </div>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                            `;
                        }
                    }

                    const skillsHtml = proj.skills.map(s => `<span style="background: #f1f5f9; color: var(--text-light); padding: 3px 8px; border-radius: 12px; font-size: 0.75rem;">${escapeHtml(s)}</span>`).join(' ');

                    return `
                        <div class="project-card">
                            <div class="project-image">
                                <i class="fas ${escapeHtml(proj.icon || 'fa-project-diagram')}"></i>
                            </div>
                            <div class="project-content">
                                ${roleBadge}
                                <h3 style="margin-top: 10px; font-size: 1.25rem;">${escapeHtml(proj.title)}</h3>
                                <p style="font-size: 0.85rem; margin-bottom: 15px; line-height: 1.4;">${escapeHtml(proj.description)}</p>
                                <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px;">
                                    ${skillsHtml}
                                </div>
                                <div class="project-meta" style="margin-bottom: 0;">
                                    <span><i class="fas fa-user"></i> By: ${escapeHtml(proj.creator.username)}</span>
                                    <span><i class="fas fa-users"></i> Team: ${proj.members ? proj.members.length : 1}</span>
                                </div>
                                ${applicantsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.processAction = async function(projectId, applicantId, action) {
                try {
                    const res = await fetch(`http://localhost:5000/api/projects/${projectId}/action`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ applicantId, action })
                    });
                    
                    if (res.ok) {
                        alert(`Applicant successfully ${action}ed!`);
                        loadMyProjects();
                    } else {
                        const data = await res.json();
                        alert(data.msg || 'Action failed');
                    }
                } catch (error) {
                    console.error('Error actioning applicant:', error);
                }
            };

            function escapeHtml(str) {
                if (!str) return "";
                return str.toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            loadMyProjects();
        });
    </script>
</body>
</html>
